name: S232B.1 TrustEvidenceBar Runtime Acceptance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  s232b1-trust-runtime:
    name: S232B.1 Exact-Head TrustEvidenceBar Runtime
    if: >-
      github.event.pull_request.number == 582 &&
      github.event.pull_request.head.ref == 'agent/s232b1-trust-evidence-bar-parity' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.body, '<!-- run-s232b1-auth-e2e -->')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: s232b1-trust-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      CI: "true"
      S232B1_AUTH_RUNTIME: "1"
      E2E_BASE_URL: https://inverge-git-agent-s232b1-trust-ev-8fe8bf-chachathecats-projects.vercel.app
      E2E_EXPECTED_HOST: inverge-git-agent-s232b1-trust-ev-8fe8bf-chachathecats-projects.vercel.app
      E2E_RUNNER_SHA: ${{ github.event.pull_request.head.sha }}
      E2E_TARGET_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Wait for exact-head Preview
        shell: bash
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          test -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          test "${E2E_BASE_URL}" = "https://${E2E_EXPECTED_HOST}"
          [[ "${E2E_RUNNER_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]

          exact_head_ready=0
          attempt=0
          deadline=$((SECONDS + 600))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            attempt=$((attempt + 1))
            body_path="$(mktemp)"
            status="$(
              curl --silent --show-error \
                --output "${body_path}" \
                --write-out '%{http_code}' \
                --max-redirs 0 \
                --connect-timeout 5 \
                --max-time 10 \
                --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
                "${E2E_BASE_URL}/api/runtime/version?runner=${E2E_RUNNER_SHA}&attempt=${attempt}"
            )" || status="000"

            if [ "${status}" = "200" ] && \
              BODY_PATH="${body_path}" EXPECTED_SHA="${E2E_RUNNER_SHA}" node --input-type=module -e '
                import { readFileSync } from "node:fs";
                const payload = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
                if (payload.ready !== true || payload.deploymentSha !== process.env.EXPECTED_SHA) process.exit(1);
              ' >/dev/null 2>&1; then
              exact_head_ready=1
              rm -f "${body_path}"
              break
            fi

            case "${status}" in
              301|302|303|307|308|401|403)
                rm -f "${body_path}"
                echo "::error::Preview protection or host validation failed with HTTP ${status}."
                exit 1
                ;;
            esac
            rm -f "${body_path}"
            echo "::notice::Exact-head Preview is not ready yet (HTTP ${status}, attempt ${attempt})."
            sleep 5
          done
          test "${exact_head_ready}" = "1"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm exec playwright install -- --with-deps chromium

      - name: Run exact-head synthetic and authenticated trust acceptance
        id: runtime_acceptance
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL || secrets.TEST_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD || secrets.TEST_USER_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${E2E_USER_EMAIL:-}"
          test -n "${E2E_USER_PASSWORD:-}"
          test -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          npm run test:e2e -- tests/e2e/s232b1-trust-evidence-bar.spec.ts tests/e2e/s232b1-authenticated-runtime.spec.ts --project=chromium --workers=1 --reporter=line --trace=off

      - name: Recheck exact deployment SHA
        id: postflight_sha
        if: steps.runtime_acceptance.outcome == 'success'
        shell: bash
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          body_path="$(mktemp)"
          status="$(
            curl --silent --show-error \
              --output "${body_path}" \
              --write-out '%{http_code}' \
              --max-redirs 0 \
              --connect-timeout 10 \
              --max-time 30 \
              --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
              "${E2E_BASE_URL}/api/runtime/version?postflight=${E2E_RUNNER_SHA}"
          )"
          test "${status}" = "200"
          BODY_PATH="${body_path}" EXPECTED_SHA="${E2E_RUNNER_SHA}" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const payload = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
            if (payload.ready !== true || payload.deploymentSha !== process.env.EXPECTED_SHA) {
              throw new Error("Postflight deployment SHA mismatch.");
            }
          '
          rm -f "${body_path}"

      - name: Validate metadata-only S232B.1 evidence
        id: evidence_guard
        if: always()
        shell: bash
        env:
          RUNTIME_OUTCOME: ${{ steps.runtime_acceptance.outcome }}
          POSTFLIGHT_OUTCOME: ${{ steps.postflight_sha.outcome }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "${RUNTIME_OUTCOME}" != "success" ] || [ "${POSTFLIGHT_OUTCOME}" != "success" ]; then
            echo "::error::Runtime or postflight SHA verification failed; refusing evidence publication."
            exit 1
          fi
          if find test-results -type f \( \
            -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' -o \
            -name '*.zip' -o -name '*.webm' -o -name '*.mp4' \
          \) -print -quit | grep -q .; then
            echo "::error::Screenshot, trace, archive, or video output exists; refusing evidence publication."
            exit 1
          fi
          mapfile -d '' manifests < <(find test-results -type f -name 's232b1-runtime.json' -print0)
          if [ "${#manifests[@]}" -ne 1 ]; then
            echo "::error::Exactly one S232B.1 manifest is required."
            exit 1
          fi

          MANIFEST_PATH="${manifests[0]}" node --input-type=module - <<'NODE'
          import { copyFileSync, existsSync, mkdirSync, readFileSync } from "node:fs";
          const fail = (message) => { throw new Error(`S232B.1 evidence integrity: ${message}`); };
          const text = readFileSync(process.env.MANIFEST_PATH, "utf8");
          if (/@[a-z0-9.-]+\.[a-z]{2,}/i.test(text)) fail("email-like text found");
          if (/"(?:password|email|itemid|route|date|state|outerhtml|innerhtml|raw[_-]?(?:learner|answer|ocr|problem|reference)|localstorage|sessionstorage)"\s*:/i.test(text)) {
            fail("private, state, or raw-content key found");
          }
          const manifest = JSON.parse(text);
          const expectedSha = process.env.E2E_RUNNER_SHA;
          const topKeys = [
            "schemaVersion", "result", "runnerSha", "targetDeploymentSha", "observedDeploymentSha",
            "signInAttempts", "persistedDetailAvailable", "viewportEvidence", "consoleErrorCount",
            "pageErrorCount", "sameOriginRequestFailureCount", "credentialsRedacted",
            "rawLearnerContentCaptured", "screenshotCaptured", "traceCaptured", "videoCaptured",
          ];
          if (Object.keys(manifest).sort().join("|") !== [...topKeys].sort().join("|")) fail("unexpected top-level key");
          if (!/^[0-9a-f]{40}$/i.test(expectedSha ?? "") || process.env.EVENT_HEAD_SHA !== expectedSha) fail("invalid exact head");
          if (manifest.result !== "pass" || manifest.schemaVersion !== 1) fail("invalid result");
          for (const key of ["runnerSha", "targetDeploymentSha", "observedDeploymentSha"]) {
            if (manifest[key] !== expectedSha) fail(`${key} mismatch`);
          }
          if (!Number.isInteger(manifest.signInAttempts) || manifest.signInAttempts < 1) fail("invalid sign-in attempts");
          if (manifest.persistedDetailAvailable !== true) fail("evidence-backed persisted detail is required");
          if (!Array.isArray(manifest.viewportEvidence) || manifest.viewportEvidence.length !== 2) fail("invalid viewport evidence");
          const entryKeys = [
            "viewport", "componentCount", "readingCount", "railCount", "correctOrder",
            "horizontalOverflow", "collapsedHeightValid", "expandedHeightValid", "targetSizeValid",
            "enterToggleValid", "spaceToggleValid", "controlsResolve", "axeBlockingCount",
            "evidenceBackedStatePresent",
          ];
          const expectedViewports = new Set(["390", "1440"]);
          const observedViewports = new Set();
          for (const entry of manifest.viewportEvidence) {
            if (!entry || typeof entry !== "object" || Array.isArray(entry)) fail("invalid viewport entry");
            if (Object.keys(entry).sort().join("|") !== [...entryKeys].sort().join("|")) fail("unexpected viewport key");
            if (!expectedViewports.has(entry.viewport) || observedViewports.has(entry.viewport)) fail("invalid viewport");
            observedViewports.add(entry.viewport);
            if (entry.componentCount !== 1 || entry.readingCount !== 1 || entry.railCount !== 0) fail("component placement mismatch");
            if (entry.correctOrder !== true || entry.controlsResolve !== true) fail("order or disclosure mismatch");
            if (typeof entry.horizontalOverflow !== "number" || entry.horizontalOverflow < 0 || entry.horizontalOverflow > 1) fail("horizontal overflow");
            for (const key of [
              "collapsedHeightValid", "expandedHeightValid", "targetSizeValid", "enterToggleValid",
              "spaceToggleValid", "evidenceBackedStatePresent",
            ]) {
              if (entry[key] !== true) fail(`${key} mismatch`);
            }
            if (entry.axeBlockingCount !== 0) fail("blocking Axe violation");
          }
          if (observedViewports.size !== expectedViewports.size) fail("incomplete viewport coverage");
          if (
            manifest.consoleErrorCount !== 0 ||
            manifest.pageErrorCount !== 0 ||
            manifest.sameOriginRequestFailureCount !== 0 ||
            manifest.credentialsRedacted !== true ||
            manifest.rawLearnerContentCaptured !== false ||
            manifest.screenshotCaptured !== false ||
            manifest.traceCaptured !== false ||
            manifest.videoCaptured !== false
          ) fail("runtime or privacy mismatch");
          if (existsSync("s232b1-evidence")) fail("evidence directory already exists");
          mkdirSync("s232b1-evidence");
          copyFileSync(process.env.MANIFEST_PATH, "s232b1-evidence/s232b1-runtime.json");
          NODE

      - name: Upload validated S232B.1 runtime evidence
        if: always() && steps.evidence_guard.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: s232b1-trust-evidence-${{ github.run_id }}
          path: s232b1-evidence/s232b1-runtime.json
          if-no-files-found: error
          retention-days: 7
