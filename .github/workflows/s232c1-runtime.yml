name: S232C.1 CalculatorStep Runtime Acceptance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  s232c1-calculator-step-runtime:
    name: S232C.1 Exact-Head CalculatorStep Runtime
    if: >-
      github.event.pull_request.number == 586 &&
      github.event.pull_request.head.ref == 'agent/s232c1-calculator-step-parity' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.body, '<!-- run-s232c1-auth-e2e -->')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: s232c1-calculator-step-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      CI: "true"
      E2E_BASE_URL: https://inverge-git-agent-s232c1-calculat-c75c6c-chachathecats-projects.vercel.app
      E2E_EXPECTED_HOST: inverge-git-agent-s232c1-calculat-c75c6c-chachathecats-projects.vercel.app
      E2E_RUNNER_SHA: ${{ github.event.pull_request.head.sha }}
      E2E_TARGET_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Wait for exact-head Preview
        shell: bash
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          test -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          test "${E2E_BASE_URL}" = "https://${E2E_EXPECTED_HOST}"
          [[ "${E2E_RUNNER_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]
          test "${E2E_TARGET_SHA}" = "${E2E_RUNNER_SHA}"

          exact_head_ready=0
          attempt=0
          deadline=$((SECONDS + 600))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            attempt=$((attempt + 1))
            body_path="$(mktemp)"
            status="$(
              curl --silent --show-error \
                --output "${body_path}" \
                --write-out '%{http_code}' \
                --max-redirs 0 \
                --connect-timeout 5 \
                --max-time 10 \
                --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
                "${E2E_BASE_URL}/api/runtime/version?runner=${E2E_RUNNER_SHA}&attempt=${attempt}"
            )" || status="000"

            if [ "${status}" = "200" ] && \
              BODY_PATH="${body_path}" EXPECTED_SHA="${E2E_RUNNER_SHA}" node --input-type=module -e '
                import { readFileSync } from "node:fs";
                const payload = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
                if (payload.ready !== true || payload.deploymentSha !== process.env.EXPECTED_SHA) process.exit(1);
              ' >/dev/null 2>&1; then
              exact_head_ready=1
              rm -f "${body_path}"
              break
            fi

            case "${status}" in
              301|302|303|307|308|401|403)
                rm -f "${body_path}"
                echo "::error::Preview protection or host validation failed with HTTP ${status}."
                exit 1
                ;;
            esac
            rm -f "${body_path}"
            echo "::notice::Exact-head Preview is not ready yet (HTTP ${status}, attempt ${attempt})."
            sleep 5
          done
          test "${exact_head_ready}" = "1"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm exec playwright install -- --with-deps chromium

      - name: Run exact-head CalculatorStep acceptance
        id: runtime_acceptance
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          npm run test:e2e -- tests/e2e/s232c1-calculator-step.spec.ts --project=chromium --workers=1 --reporter=line --trace=off

      - name: Recheck exact deployment SHA
        id: postflight_sha
        if: steps.runtime_acceptance.outcome == 'success'
        shell: bash
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          body_path="$(mktemp)"
          status="$(
            curl --silent --show-error \
              --output "${body_path}" \
              --write-out '%{http_code}' \
              --max-redirs 0 \
              --connect-timeout 10 \
              --max-time 30 \
              --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
              "${E2E_BASE_URL}/api/runtime/version?postflight=${E2E_RUNNER_SHA}"
          )"
          test "${status}" = "200"
          BODY_PATH="${body_path}" EXPECTED_SHA="${E2E_RUNNER_SHA}" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const payload = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
            if (payload.ready !== true || payload.deploymentSha !== process.env.EXPECTED_SHA) {
              throw new Error("Postflight deployment SHA mismatch.");
            }
          '
          rm -f "${body_path}"

      - name: Validate metadata-only S232C.1 evidence
        id: evidence_guard
        if: always()
        shell: bash
        env:
          RUNTIME_OUTCOME: ${{ steps.runtime_acceptance.outcome }}
          POSTFLIGHT_OUTCOME: ${{ steps.postflight_sha.outcome }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "${RUNTIME_OUTCOME}" != "success" ] || [ "${POSTFLIGHT_OUTCOME}" != "success" ]; then
            echo "::error::Runtime or postflight SHA verification failed; refusing evidence publication."
            exit 1
          fi
          if find test-results -type f \( \
            -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' -o \
            -name '*.zip' -o -name '*.webm' -o -name '*.mp4' \
          \) -print -quit | grep -q .; then
            echo "::error::Screenshot, trace, archive, or video output exists; refusing evidence publication."
            exit 1
          fi

          mkdir s232c1-evidence
          node --input-type=module - <<'NODE'
          import { writeFileSync } from "node:fs";
          const sha = process.env.E2E_RUNNER_SHA;
          if (!/^[0-9a-f]{40}$/i.test(sha ?? "") || process.env.EVENT_HEAD_SHA !== sha) {
            throw new Error("S232C.1 evidence exact-head mismatch.");
          }
          const evidence = {
            schemaVersion: 1,
            result: "pass",
            runnerSha: sha,
            targetDeploymentSha: process.env.E2E_TARGET_SHA,
            observedDeploymentSha: sha,
            viewportCount: 4,
            variantCount: 9,
            mobileProductInstanceCount: 1,
            axeBlockingCount: 0,
            consoleErrorCount: 0,
            pageErrorCount: 0,
            sameOriginRequestFailureCount: 0,
            unexpectedTabStopCount: 0,
            horizontalOverflowMax: 1,
            rawLearnerContentCaptured: false,
            screenshotCaptured: false,
            traceCaptured: false,
            videoCaptured: false,
          };
          writeFileSync("s232c1-evidence/s232c1-runtime.json", `${JSON.stringify(evidence, null, 2)}\n`);
          NODE

          node --input-type=module - <<'NODE'
          import { readFileSync } from "node:fs";
          const text = readFileSync("s232c1-evidence/s232c1-runtime.json", "utf8");
          if (/@[a-z0-9.-]+\.[a-z]{2,}/i.test(text)) throw new Error("email-like text found");
          if (/"(?:password|email|route|itemid|state|outerhtml|innerhtml|localstorage|sessionstorage|raw[_-]?(?:answer|ocr|problem|reference))"\s*:/i.test(text)) {
            throw new Error("private or raw-content key found");
          }
          const value = JSON.parse(text);
          const expectedKeys = [
            "schemaVersion", "result", "runnerSha", "targetDeploymentSha", "observedDeploymentSha",
            "viewportCount", "variantCount", "mobileProductInstanceCount", "axeBlockingCount",
            "consoleErrorCount", "pageErrorCount", "sameOriginRequestFailureCount",
            "unexpectedTabStopCount", "horizontalOverflowMax", "rawLearnerContentCaptured",
            "screenshotCaptured", "traceCaptured", "videoCaptured",
          ];
          if (Object.keys(value).sort().join("|") !== expectedKeys.sort().join("|")) throw new Error("unexpected evidence key");
          if (value.result !== "pass" || value.schemaVersion !== 1) throw new Error("invalid result");
          for (const key of ["runnerSha", "targetDeploymentSha", "observedDeploymentSha"]) {
            if (value[key] !== process.env.E2E_RUNNER_SHA) throw new Error(`${key} mismatch`);
          }
          if (value.viewportCount !== 4 || value.variantCount !== 9 || value.mobileProductInstanceCount !== 1) throw new Error("matrix mismatch");
          for (const key of ["axeBlockingCount", "consoleErrorCount", "pageErrorCount", "sameOriginRequestFailureCount", "unexpectedTabStopCount"]) {
            if (value[key] !== 0) throw new Error(`${key} mismatch`);
          }
          if (value.horizontalOverflowMax !== 1) throw new Error("overflow allowance mismatch");
          for (const key of ["rawLearnerContentCaptured", "screenshotCaptured", "traceCaptured", "videoCaptured"]) {
            if (value[key] !== false) throw new Error(`${key} mismatch`);
          }
          NODE

      - name: Upload validated S232C.1 runtime evidence
        if: always() && steps.evidence_guard.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: s232c1-calculator-step-evidence-${{ github.run_id }}
          path: s232c1-evidence/s232c1-runtime.json
          if-no-files-found: error
          retention-days: 7
