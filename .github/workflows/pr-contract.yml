name: PR Contract

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-contract:
    name: pr-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate PR contract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/automation/validate-pr-contract.mjs
