name: PR Contract

on:
  pull_request:

jobs:
  pr-contract:
    runs-on: ubuntu-latest
    concurrency:
      group: pr-contract-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate PR contract
        run: node scripts/automation/validate-pr-contract.mjs
