name: PR Contract

on:
  pull_request:

jobs:
  pr-contract:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    concurrency:
      group: pr-contract-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR contract
        run: |
          echo "Validate PR contract fields"
          node scripts/automation/validate-pr-contract.mjs
