name: E2E Smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      DEV_SMOKE_AUTH: "true"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke
        run: npm run test:e2e:smoke
