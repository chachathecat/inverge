name: E2E Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: Runtime suite to execute
        required: true
        default: s228-study-ledger
        type: choice
        options:
          - s227-invited-runtime
          - s228-study-ledger
          - staging-smoke
      target_sha:
        description: Exact 40-character git SHA deployed at E2E_BASE_URL (required for S227)
        required: false
        default: ""
        type: string
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e-staging-smoke:
    name: E2E Staging Smoke (Optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && vars.ENABLE_E2E_SMOKE == 'true') || (github.event_name == 'workflow_dispatch' && inputs.suite == 'staging-smoke')
    env:
      CI: "true"
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      TEST_AUTH_STATE_PATH: ${{ secrets.TEST_AUTH_STATE_PATH }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Determine staging smoke readiness
        id: readiness
        shell: bash
        run: |
          HAS_BASE_URL=false
          HAS_AUTH=false

          if [ -n "${E2E_BASE_URL}" ]; then
            HAS_BASE_URL=true
          fi

          if [ -n "${TEST_AUTH_STATE_PATH}" ]; then
            HAS_AUTH=true
          fi

          if [ -n "${TEST_USER_EMAIL}" ] && [ -n "${TEST_USER_PASSWORD}" ]; then
            HAS_AUTH=true
          fi

          if [ "${HAS_BASE_URL}" = "true" ] && [ "${HAS_AUTH}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Staging smoke prerequisites found; running Playwright staging smoke."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping staging smoke: missing E2E_BASE_URL and auth secrets."
          fi

      - name: Skip staging smoke (missing secrets)
        if: steps.readiness.outputs.should_run != 'true'
        run: |
          echo "Staging smoke skipped because required secrets are not configured."
          echo "Required: E2E_BASE_URL plus TEST_AUTH_STATE_PATH or TEST_USER_EMAIL/TEST_USER_PASSWORD"

      - name: Install dependencies
        if: steps.readiness.outputs.should_run == 'true'
        run: npm ci
      - name: Install Playwright browser
        if: steps.readiness.outputs.should_run == 'true'
        run: npm exec playwright install -- --with-deps chromium
      - name: Run staging /app loop smoke
        if: steps.readiness.outputs.should_run == 'true'
        run: npm run test:e2e:staging

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-smoke-artifacts
          path: |
            playwright-report
            test-results
            **/trace.zip
            **/*.png
          if-no-files-found: ignore

  s228-study-ledger-runtime:
    name: S228 Authenticated Study Ledger Runtime
    if: (github.event_name == 'workflow_dispatch' && (inputs.suite == 's228-study-ledger' || inputs.suite == '')) || (github.event_name == 'pull_request' && github.event.pull_request.number == 560 && contains(github.event.pull_request.body, '<!-- run-s228-auth-e2e -->'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: s228-study-ledger-${{ github.ref }}
      cancel-in-progress: true
    env:
      CI: "true"
      S228_AUTH_RUNTIME: "1"
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL || secrets.TEST_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD || secrets.TEST_USER_PASSWORD }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify safe authenticated runtime prerequisites
        shell: bash
        run: |
          if [ -z "${E2E_BASE_URL}" ] || [ -z "${E2E_USER_EMAIL}" ] || [ -z "${E2E_USER_PASSWORD}" ]; then
            echo "::error::Missing E2E_BASE_URL and dedicated test-account credentials."
            exit 1
          fi

          case "${E2E_BASE_URL}" in
            *.vercel.app|*.vercel.app/)
              if [ -z "${VERCEL_AUTOMATION_BYPASS_SECRET}" ]; then
                echo "::error::Protected Vercel Preview requires VERCEL_AUTOMATION_BYPASS_SECRET."
                exit 1
              fi
              ;;
          esac

      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npm exec playwright install -- --with-deps chromium
      - name: Run focused Study Ledger runtime acceptance
        run: npm run test:e2e -- tests/e2e/study-ledger-v3-detail.spec.ts --project=chromium --workers=1 --reporter=line

      - name: Upload sanitized S228 runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s228-study-ledger-runtime-${{ github.run_id }}
          path: |
            test-results/**/s228-*.png
            test-results/**/s228-runtime.json
          if-no-files-found: ignore
          retention-days: 7

  s227-invited-account-runtime:
    name: S227 Invited-Account Runtime Acceptance
    if: (github.event_name == 'workflow_dispatch' && inputs.suite == 's227-invited-runtime') || (github.event_name == 'pull_request' && github.event.pull_request.number == 565 && contains(github.event.pull_request.body, '<!-- run-s227-auth-e2e -->'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: s227-invited-runtime-${{ github.ref }}
      cancel-in-progress: true
    env:
      CI: "true"
      S227_AUTH_RUNTIME: "1"
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_TARGET_SHA: ${{ inputs.target_sha || '48df4437fea8853250fcab00f7250c41f8d93a23' }}
      E2E_EXPECTED_HOST: ${{ github.event_name == 'pull_request' && 'inverge-git-agent-s228-study-ledg-a51430-chachathecats-projects.vercel.app' || '' }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL || secrets.TEST_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD || secrets.TEST_USER_PASSWORD }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify safe invited-account runtime prerequisites
        shell: bash
        run: |
          if [ -z "${E2E_BASE_URL}" ] || [ -z "${E2E_USER_EMAIL}" ] || [ -z "${E2E_USER_PASSWORD}" ]; then
            echo "::error::Missing E2E_BASE_URL and dedicated test-account credentials."
            exit 1
          fi

          if [[ ! "${E2E_TARGET_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::S227 requires target_sha as the exact 40-character deployment commit."
            exit 1
          fi

          case "${E2E_BASE_URL}" in
            *.vercel.app|*.vercel.app/)
              if [ -z "${VERCEL_AUTOMATION_BYPASS_SECRET}" ]; then
                echo "::error::Protected Vercel Preview requires VERCEL_AUTOMATION_BYPASS_SECRET."
                exit 1
              fi
              ;;
          esac

      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npm exec playwright install -- --with-deps chromium
      - name: Run focused invited-account runtime acceptance
        run: npm run test:e2e -- tests/e2e/s227-invited-runtime-acceptance.spec.ts --project=chromium --workers=1 --reporter=line

      - name: Upload sanitized S227 runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s227-invited-runtime-${{ github.run_id }}
          path: |
            test-results/**/s227-*.png
            test-results/**/s227-runtime.json
          if-no-files-found: ignore
          retention-days: 7
