name: S232H.2 Production V3 Visual Acceptance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  s232h2-production-v3-visual:
    name: S232H.2 Exact-Head Production V3 Visual
    if: >-
      github.event.pull_request.head.ref == 'agent/figma-v3-production-routes' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: s232h2-production-v3-visual-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      CI: "true"
      E2E_RUNNER_SHA: ${{ github.event.pull_request.head.sha }}
      E2E_TARGET_SHA: ${{ github.event.pull_request.head.sha }}
      E2E_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      E2E_BASELINE_SHA: 35836d419161d7cfe55e3e3c088fcc4d66376a7d

    steps:
      - name: Require the fixed-baseline visual acceptance marker
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: >-
          node --input-type=module -e
          'const marker = "<!-- run-s232h2-visual-e2e baseline=35836d419161d7cfe55e3e3c088fcc4d66376a7d -->";
          if (!(process.env.PR_BODY ?? "").includes(marker)) {
          throw new Error("Missing the exact S232H.2 fixed-baseline marker"); }'

      - name: Check out exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Prove the PR1 baseline tree is the PR2 merge-base tree
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for sha in "${E2E_RUNNER_SHA}" "${E2E_PR_BASE_SHA}" "${E2E_BASELINE_SHA}"; do
            [[ "${sha}" =~ ^[0-9a-f]{40}$ ]]
          done

          git fetch --no-tags origin "${E2E_PR_BASE_SHA}" "${E2E_BASELINE_SHA}"
          merge_base_sha="$(git merge-base "${E2E_RUNNER_SHA}" "${E2E_PR_BASE_SHA}")"

          baseline_tree_git="$(git rev-parse "${E2E_BASELINE_SHA}^{tree}")"
          merge_base_tree_git="$(git rev-parse "${merge_base_sha}^{tree}")"
          test "${baseline_tree_git}" = "${merge_base_tree_git}"

          baseline_tree_api="$(gh api "/repos/${GITHUB_REPOSITORY}/git/commits/${E2E_BASELINE_SHA}" --jq '.tree.sha')"
          merge_base_tree_api="$(gh api "/repos/${GITHUB_REPOSITORY}/git/commits/${merge_base_sha}" --jq '.tree.sha')"
          test "${baseline_tree_api}" = "${baseline_tree_git}"
          test "${merge_base_tree_api}" = "${merge_base_tree_git}"

          echo "E2E_MERGE_BASE_SHA=${merge_base_sha}" >> "${GITHUB_ENV}"
          echo "E2E_BASELINE_TREE_SHA=${baseline_tree_git}" >> "${GITHUB_ENV}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Discover and exact-SHA verify PR2 and fixed PR1 Previews
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          test -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"

          discover_preview() {
            local target_sha="$1"
            local env_url_name="$2"
            local env_host_name="$3"
            local output_path="$4"
            local deadline=$((SECONDS + 900))

            while [ "${SECONDS}" -lt "${deadline}" ]; do
              local deployments
              deployments="$(gh api -X GET "/repos/${GITHUB_REPOSITORY}/deployments?sha=${target_sha}&environment=Preview&per_page=30")" || deployments="[]"
              mapfile -t deployment_ids < <(
                DEPLOYMENTS="${deployments}" node --input-type=module -e '
                  const values = JSON.parse(process.env.DEPLOYMENTS ?? "[]");
                  for (const value of values) if (value?.id) process.stdout.write(String(value.id) + "\n");
                '
              )

              for deployment_id in "${deployment_ids[@]}"; do
                local statuses preview_url body_path status
                statuses="$(gh api -X GET "/repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses?per_page=20")" || statuses="[]"
                preview_url="$(
                  STATUSES="${statuses}" node --input-type=module -e '
                    const values = JSON.parse(process.env.STATUSES ?? "[]");
                    const successful = values.find((value) => value?.state === "success");
                    const raw = successful?.environment_url ?? successful?.target_url ?? "";
                    if (!raw) process.exit(0);
                    const url = new URL(raw);
                    if (url.protocol !== "https:" || url.username || url.password || url.search || url.hash ||
                      !/^inverge-[a-z0-9-]+-chachathecats-projects\.vercel\.app$/i.test(url.hostname)) process.exit(1);
                    process.stdout.write(url.origin);
                  '
                )"
                if [ -z "${preview_url}" ]; then continue; fi

                body_path="$(mktemp)"
                status="$(curl --silent --show-error --output "${body_path}" --write-out '%{http_code}' --connect-timeout 5 --max-time 20 --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" "${preview_url}/api/runtime/version")" || status="000"
                if [ "${status}" = "200" ] && BODY_PATH="${body_path}" EXPECTED_SHA="${target_sha}" node --input-type=module -e '
                    import { readFileSync } from "node:fs";
                    const value = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
                    if (value.ready !== true || value.deploymentSha !== process.env.EXPECTED_SHA) process.exit(1);
                  '; then
                  {
                    echo "${env_url_name}=${preview_url}"
                    echo "${env_host_name}=${preview_url#https://}"
                  } > "${output_path}"
                  rm -f "${body_path}"
                  return 0
                fi
                rm -f "${body_path}"
              done
              sleep 10
            done
            return 1
          }

          pr2_env="$(mktemp)"
          baseline_env="$(mktemp)"
          trap 'rm -f "${pr2_env}" "${baseline_env}"' EXIT

          discover_preview "${E2E_RUNNER_SHA}" E2E_BASE_URL E2E_EXPECTED_HOST "${pr2_env}" &
          pr2_pid=$!
          discover_preview "${E2E_BASELINE_SHA}" E2E_BASELINE_URL E2E_BASELINE_EXPECTED_HOST "${baseline_env}" &
          baseline_pid=$!

          pr2_status=0
          baseline_status=0
          wait "${pr2_pid}" || pr2_status=$?
          wait "${baseline_pid}" || baseline_status=$?
          test "${pr2_status}" -eq 0
          test "${baseline_status}" -eq 0
          cat "${pr2_env}" "${baseline_env}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: npm ci

      - name: Check the focused visual-gate contract
        run: node --test tests/s232h2-production-v3-visual-contract.test.mjs

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run privacy and auth source gate without screenshots
        id: privacy_gate
        env:
          S232H2_VISUAL_RUNTIME: "1"
          S232H2_VISUAL_PROOF_PATH: ${{ runner.temp }}/s232h2-visual-proof.json
          E2E_VISUAL_USER_EMAIL: ${{ secrets.E2E_VISUAL_USER_EMAIL }}
          E2E_VISUAL_USER_PASSWORD: ${{ secrets.E2E_VISUAL_USER_PASSWORD }}
          E2E_USER_A_EMAIL: ${{ secrets.E2E_USER_A_EMAIL }}
          E2E_USER_A_PASSWORD: ${{ secrets.E2E_USER_A_PASSWORD }}
          E2E_USER_B_EMAIL: ${{ secrets.E2E_USER_B_EMAIL }}
          E2E_USER_B_PASSWORD: ${{ secrets.E2E_USER_B_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: >-
          timeout --signal=TERM --kill-after=10s 180s
          npx playwright test tests/e2e/s232h2-production-v3-visual.spec.ts
          --project=chromium --workers=1 --reporter=line --grep "@privacy"

      - name: Run bounded production V3 accessibility gate
        id: a11y_gate
        env:
          S232H2_VISUAL_RUNTIME: "1"
          S232H2_VISUAL_PROOF_PATH: ${{ runner.temp }}/s232h2-visual-proof.json
          E2E_VISUAL_USER_EMAIL: ${{ secrets.E2E_VISUAL_USER_EMAIL }}
          E2E_VISUAL_USER_PASSWORD: ${{ secrets.E2E_VISUAL_USER_PASSWORD }}
          E2E_USER_A_EMAIL: ${{ secrets.E2E_USER_A_EMAIL }}
          E2E_USER_A_PASSWORD: ${{ secrets.E2E_USER_A_PASSWORD }}
          E2E_USER_B_EMAIL: ${{ secrets.E2E_USER_B_EMAIL }}
          E2E_USER_B_PASSWORD: ${{ secrets.E2E_USER_B_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: >-
          timeout --signal=TERM --kill-after=10s 720s
          npx playwright test tests/e2e/s232h2-production-v3-visual.spec.ts
          --project=chromium --workers=1 --reporter=line --grep "@a11y"

      - name: Run one-pass production V3 visual and Figma gate
        id: visual_gate
        env:
          S232H2_VISUAL_RUNTIME: "1"
          S232H2_VISUAL_PROOF_PATH: ${{ runner.temp }}/s232h2-visual-proof.json
          E2E_VISUAL_USER_EMAIL: ${{ secrets.E2E_VISUAL_USER_EMAIL }}
          E2E_VISUAL_USER_PASSWORD: ${{ secrets.E2E_VISUAL_USER_PASSWORD }}
          E2E_USER_A_EMAIL: ${{ secrets.E2E_USER_A_EMAIL }}
          E2E_USER_A_PASSWORD: ${{ secrets.E2E_USER_A_PASSWORD }}
          E2E_USER_B_EMAIL: ${{ secrets.E2E_USER_B_EMAIL }}
          E2E_USER_B_PASSWORD: ${{ secrets.E2E_USER_B_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: >-
          timeout --signal=TERM --kill-after=10s 900s
          npx playwright test tests/e2e/s232h2-production-v3-visual.spec.ts
          --project=chromium --workers=1 --reporter=line --grep "@visual"

      - name: Upload bounded synthetic PNG diagnostics after visual gate failure
        if: ${{ failure() && steps.privacy_gate.outcome == 'success' && steps.visual_gate.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: s232h2-production-v3-visual-failure-${{ github.event.pull_request.head.sha }}
          path: |
            test-results/**/s232h2-after-ledger-390.png
            test-results/**/s232h2-figma-mobile-ledger-56-2.png
            test-results/**/s232h2-after-ledger-1440.png
            test-results/**/s232h2-figma-desktop-ledger-59-62.png
            test-results/**/s232h2-after-calculator-390.png
            test-results/**/s232h2-figma-mobile-calculator-57-34.png
          if-no-files-found: warn
          retention-days: 7

      - name: Recheck both exact deployment SHAs and the live PR head
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail

          verify_runtime_sha() {
            local base_url="$1"
            local expected_sha="$2"
            local body_path status
            body_path="$(mktemp)"
            status="$(curl --silent --show-error --output "${body_path}" --write-out '%{http_code}' --connect-timeout 5 --max-time 20 --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" "${base_url}/api/runtime/version")"
            test "${status}" = "200"
            BODY_PATH="${body_path}" EXPECTED_SHA="${expected_sha}" node --input-type=module -e '
              import { readFileSync } from "node:fs";
              const value = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
              if (value.ready !== true || value.deploymentSha !== process.env.EXPECTED_SHA) process.exit(1);
            '
            rm -f "${body_path}"
          }

          verify_runtime_sha "${E2E_BASE_URL}" "${E2E_RUNNER_SHA}"
          verify_runtime_sha "${E2E_BASELINE_URL}" "${E2E_BASELINE_SHA}"
          current_pr_head="$(gh api "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          test "${current_pr_head}" = "${E2E_RUNNER_SHA}"

      - name: Validate the isolated synthetic screenshot manifest
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find test-results -type f -name s232h2-visual-manifest.json -print)
          test "${#manifests[@]}" -eq 1
          MANIFEST_PATH="${manifests[0]}" node --input-type=module -e '
            import { readFileSync, readdirSync } from "node:fs";
            const value = JSON.parse(readFileSync(process.env.MANIFEST_PATH, "utf8"));
            if (value.schemaVersion !== 4 || value.result !== "pass") process.exit(1);
            if (value.runnerSha !== process.env.E2E_RUNNER_SHA || value.targetDeploymentSha !== process.env.E2E_RUNNER_SHA) process.exit(1);
            if (value.baselineDeploymentSha !== process.env.E2E_BASELINE_SHA || value.mergeBaseSha !== process.env.E2E_MERGE_BASE_SHA) process.exit(1);
            if (value.baselineTreeSha !== process.env.E2E_BASELINE_TREE_SHA) process.exit(1);
            if (value.routeCount !== 13 || value.viewportCount !== 3) process.exit(1);
            if (value.initialAuditRowCount !== 39 || value.dynamicAuditRowCount !== 6 || value.auditRowCount !== 45) process.exit(1);
            if (!Array.isArray(value.auditRows) || value.auditRows.length !== value.auditRowCount) process.exit(1);
            if (value.beforeScreenshotCount !== 3 || value.initialAfterScreenshotCount !== 16 || value.dynamicScreenshotCount !== 6) process.exit(1);
            if (value.afterScreenshotCount !== 22 || value.figmaReferenceScreenshotCount !== 3 || value.figmaComparisonCount !== 3 || value.screenshotCount !== 28) process.exit(1);
            if (value.screenshotCallCount !== 25) process.exit(1);
            const privacyGate = value.privacyGate;
            if (!privacyGate || !Number.isInteger(privacyGate.scheduledCandidates) || privacyGate.scheduledCandidates < 1 || privacyGate.scheduledCandidates > 3) process.exit(1);
            if (privacyGate.completedAudits !== privacyGate.scheduledCandidates || privacyGate.notRunCount !== 0 || privacyGate.blockerCount !== 0) process.exit(1);
            if (privacyGate.screenshotCallCount !== 0 || privacyGate.endpointReadSucceeded !== true || privacyGate.snapshotReadSucceeded !== true || privacyGate.snapshotStable !== true) process.exit(1);
            if (privacyGate.crossAccountDenied !== true || privacyGate.deniedCanaryDomCount !== 0 || privacyGate.fixtureOwnershipClosed !== true) process.exit(1);
            if (!Number.isInteger(privacyGate.selectedAccountItemCount) || privacyGate.selectedAccountItemCount < 1 || privacyGate.selectedExactFixtureCount !== privacyGate.selectedAccountItemCount) process.exit(1);
            if (privacyGate.targetSessionBound !== true || privacyGate.baselineSessionBound !== true || privacyGate.baselineUsesSelectedFixture !== true) process.exit(1);
            if (privacyGate.unknownLearnerEndpointCount !== 0 || privacyGate.unknownLearnerRowCount !== 0 || privacyGate.rawIdentityArtifactCount !== 0) process.exit(1);
            const a11yGate = value.a11yGate;
            if (!a11yGate || a11yGate.scheduledCandidates !== 45 || a11yGate.completedAudits !== 45 || a11yGate.blockerCount !== 0) process.exit(1);
            if (a11yGate.mobileFullScheduled !== 19 || a11yGate.mobileFullCompleted !== 19) process.exit(1);
            if (a11yGate.geometryScheduled !== 26 || a11yGate.geometryCompleted !== 26) process.exit(1);
            if (!Number.isInteger(a11yGate.keyboardScheduled) || a11yGate.keyboardScheduled < 2 || a11yGate.keyboardScheduled > 3 || a11yGate.keyboardCompleted !== a11yGate.keyboardScheduled) process.exit(1);
            const visualGate = value.visualGate;
            if (!visualGate || visualGate.scheduledCandidates !== 25 || visualGate.completedAudits !== 25) process.exit(1);
            if (visualGate.preparationBlockerCount !== 0 || visualGate.cleanupBlockerCount !== 0 || visualGate.visualBlockerCount !== 0 || visualGate.privacyBlockerCount !== 0) process.exit(1);
            if (visualGate.screenshotCallCount !== 25 || visualGate.snapshotReadSucceeded !== true || visualGate.snapshotStable !== true) process.exit(1);
            if (!Array.isArray(value.screenshots) || value.screenshots.length !== value.screenshotCount || new Set(value.screenshots).size !== value.screenshotCount) process.exit(1);
            if (!value.screenshots.every((name) => typeof name === "string" && /^s232h2-[a-z0-9-]+\.png$/.test(name))) process.exit(1);
            const requiredReferences = new Set([
              "s232h2-figma-mobile-ledger-56-2.png",
              "s232h2-figma-desktop-ledger-59-62.png",
              "s232h2-figma-mobile-calculator-57-34.png",
            ]);
            if (![...requiredReferences].every((name) => value.screenshots.includes(name))) process.exit(1);
            if (value.syntheticFixtureReady !== true || value.fixtureOwnershipClosed !== true || value.credentialsRedacted !== true || value.identityMasked !== true) process.exit(1);
            if (value.privateLearnerContentCaptured !== false || value.actualAccountArtifactCount !== 0) process.exit(1);
            if (value.traceCaptured !== false || value.videoCaptured !== false || value.domCaptured !== false || value.rawInputArtifactCaptured !== false) process.exit(1);
            if (value.consoleErrorCount !== 0 || value.pageErrorCount !== 0 || value.sameOriginRequestFailureCount !== 0) process.exit(1);
            const initialRows = value.auditRows.filter((row) => row.auditKind === "initial-route");
            const dynamicRows = value.auditRows.filter((row) => row.auditKind === "dynamic-state");
            if (initialRows.length !== 39 || dynamicRows.length !== 6) process.exit(1);
            const requiredInitialRoutes = new Set([
              "home", "login", "today", "capture", "answer-review", "review", "notes",
              "ledger", "session", "agenda", "weekly", "write", "calculator",
            ]);
            const initialKeys = new Set(initialRows.map((row) => `${row.route}:${row.viewportWidth}`));
            if (initialKeys.size !== 39 || !initialRows.every((row) => requiredInitialRoutes.has(row.route) && [390, 768, 1440].includes(row.viewportWidth))) process.exit(1);
            const requiredDynamicStates = new Set([
              "capture:extraction-preview", "answer-review:result", "answer-review:rewrite",
              "review:revealed-selected", "session:saved-capture", "calculator:completed-saved",
            ]);
            const dynamicKeys = new Set(dynamicRows.map((row) => `${row.route}:${row.state}`));
            if (dynamicKeys.size !== 6 || !dynamicRows.every((row) => row.viewportWidth === 390 && requiredDynamicStates.has(`${row.route}:${row.state}`))) process.exit(1);
            for (const row of value.auditRows) {
              if (row.mainCount !== 1 || row.visibleH1Count !== 1 || row.horizontalOverflow !== 0 || row.viewportBoundsFailureCount !== 0) process.exit(1);
              if (row.auditProfile === "mobile-full") {
                if (row.viewportWidth !== 390 || row.visiblePrimaryActionCount === null || row.visiblePrimaryActionCount > 1 || row.undersizedTargetCount !== 0 || row.axeSeriousOrCritical !== 0) process.exit(1);
              } else if (row.auditProfile === "geometry") {
                if (![768, 1440].includes(row.viewportWidth) || row.visiblePrimaryActionCount !== null || row.undersizedTargetCount !== null || row.axeSeriousOrCritical !== null) process.exit(1);
              } else process.exit(1);
              if (row.keyboardFocusVisible !== null && row.keyboardFocusVisible !== true) process.exit(1);
              if (row.gradientCount !== 0) process.exit(1);
              if (row.viewportWidth === 1440 && row.shadowCount !== 0) process.exit(1);
              if (row.canonicalDock === true ? row.fixedDockCount !== 1 : row.fixedDockCount !== 0) process.exit(1);
              if (row.canvasColor !== "rgb(247, 246, 243)" || !/Noto Sans KR/i.test(row.bodyFontFamily)) process.exit(1);
              if (row.pageEdge !== (row.viewportWidth < 768 ? 20 : 32) || row.controlHeight !== 52 || row.controlRadius !== 12) process.exit(1);
              if (row.readingColumn !== 680 || row.contentMax !== 1120) process.exit(1);
            }
            if (!Array.isArray(value.figmaComparisons) || value.figmaComparisons.length !== 3) process.exit(1);
            const expectedFigma = new Map([
              ["56:2", { dimensions: [390, 844], route: "/app/items/[itemId]?mode=second", actual: "s232h2-after-ledger-390.png", reference: "s232h2-figma-mobile-ledger-56-2.png" }],
              ["59:62", { dimensions: [1440, 1024], route: "/app/items/[itemId]?mode=second", actual: "s232h2-after-ledger-1440.png", reference: "s232h2-figma-desktop-ledger-59-62.png" }],
              ["57:34", { dimensions: [390, 844], route: "/app/calculator?mode=second&context=practice&focus=casio", actual: "s232h2-after-calculator-390.png", reference: "s232h2-figma-mobile-calculator-57-34.png" }],
            ]);
            for (const comparison of value.figmaComparisons) {
              const expected = expectedFigma.get(comparison.node);
              if (!expected || comparison.passed !== true) process.exit(1);
              if (comparison.route !== expected.route || comparison.actualFileName !== expected.actual || comparison.referenceFileName !== expected.reference) process.exit(1);
              if (comparison.actualWidth !== expected.dimensions[0] || comparison.actualHeight !== expected.dimensions[1]) process.exit(1);
              if (comparison.referenceWidth !== expected.dimensions[0] || comparison.referenceHeight !== expected.dimensions[1]) process.exit(1);
              for (const field of [
                "meanColorDelta", "nearPixelRatio", "darkPixelRatioDelta", "warmPixelRatioDelta", "bluePixelRatioDelta",
                "cellRgbMeanAbsoluteError", "cellOccupancyMeanAbsoluteError", "edgeGridCorrelation", "edgeEnergyRatio",
                "dilatedEdgeF1", "anchorMaxRgbMeanDelta", "anchorMaxLuminanceStdDelta", "anchorMaxDarkRatioDelta",
                "anchorMinEdgeDensityRatio", "anchorMaxEdgeDensityRatio",
              ]) {
                if (typeof comparison[field] !== "number" || !Number.isFinite(comparison[field])) process.exit(1);
              }
              if (comparison.meanColorDelta > 0.18 || comparison.nearPixelRatio < 0.5) process.exit(1);
              if (comparison.darkPixelRatioDelta > 0.09 || comparison.warmPixelRatioDelta > 0.09 || comparison.bluePixelRatioDelta > 0.12) process.exit(1);
              if (comparison.cellRgbMeanAbsoluteError > 0.1 || comparison.cellOccupancyMeanAbsoluteError > 0.12) process.exit(1);
              if (comparison.edgeGridCorrelation < 0.5 || comparison.edgeEnergyRatio < 0.4 || comparison.edgeEnergyRatio > 2.2 || comparison.dilatedEdgeF1 < 0.25) process.exit(1);
              if (comparison.anchorMaxRgbMeanDelta > 0.18 || comparison.anchorMaxLuminanceStdDelta > 0.18 || comparison.anchorMaxDarkRatioDelta > 0.2) process.exit(1);
              if (comparison.anchorMinEdgeDensityRatio < 0.2 || comparison.anchorMaxEdgeDensityRatio > 3.5) process.exit(1);
            }
            if (new Set(value.figmaComparisons.map((comparison) => comparison.node)).size !== 3) process.exit(1);
            const requiredNodes = ["43:2", "44:9", "45:2", "47:28", "48:75", "50:59", "51:44", "52:42", "53:129", "56:2", "57:34", "59:62", "61:2", "61:80"];
            const mapping = JSON.stringify(value.figmaMapping);
            if (!requiredNodes.every((node) => mapping.includes(node))) process.exit(1);
            const serialized = JSON.stringify(value);
            if (/@[a-z0-9.-]+\.[a-z]{2,}/i.test(serialized)) process.exit(1);
            if (/E2E_(?:VISUAL_USER|USER_[AB])_(?:EMAIL|PASSWORD)/.test(serialized)) process.exit(1);
            if (/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/i.test(serialized)) process.exit(1);
            if (/\b[0-9a-f]{64}\b/i.test(serialized)) process.exit(1);
            const forbiddenArtifactKeys = new Set([
              "email", "password", "userId", "itemId", "accountId", "sessionId",
              "selectedCredentialAlias", "selectedSlot", "selectedFingerprint",
              "selectedSessionFingerprint", "fixtureItemIds", "fixtureIds",
              "ledgerItemId", "canaryValue", "deniedCanary", "rawIds",
              "sessionUserId",
            ]);
            const visitKeys = (entry) => {
              if (!entry || typeof entry !== "object") return true;
              if (Array.isArray(entry)) return entry.every(visitKeys);
              return Object.entries(entry).every(([key, child]) => !forbiddenArtifactKeys.has(key) && visitKeys(child));
            };
            if (!visitKeys(value)) process.exit(1);
            const physicalScreenshots = [];
            const visit = (directory) => {
              for (const entry of readdirSync(directory, { withFileTypes: true })) {
                const path = `${directory}/${entry.name}`;
                if (entry.isDirectory()) visit(path);
                else if (/^s232h2-[a-z0-9-]+\.png$/.test(entry.name)) physicalScreenshots.push(entry.name);
              }
            };
            visit("test-results");
            if (physicalScreenshots.length !== 28 || new Set(physicalScreenshots).size !== 28) process.exit(1);
            if (physicalScreenshots.sort().join("\n") !== [...value.screenshots].sort().join("\n")) process.exit(1);
          '
          mapfile -t screenshots < <(find test-results -type f -name 's232h2-*.png' -print)
          test "${#screenshots[@]}" -eq 28

      - name: Upload 28 synthetic and Figma-reference PNGs and one manifest
        uses: actions/upload-artifact@v4
        with:
          name: s232h2-production-v3-visual-${{ github.event.pull_request.head.sha }}
          path: |
            test-results/**/s232h2-visual-manifest.json
            test-results/**/s232h2-*.png
          if-no-files-found: error
          retention-days: 14

      - name: Remove the ephemeral visual-account proof
        if: ${{ always() }}
        env:
          S232H2_VISUAL_PROOF_PATH: ${{ runner.temp }}/s232h2-visual-proof.json
        run: rm -f -- "${S232H2_VISUAL_PROOF_PATH}"
