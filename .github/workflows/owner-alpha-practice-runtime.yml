name: Owner Alpha Practice Runtime

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  owner-alpha-practice-runtime:
    name: owner-alpha-practice-runtime
    if: >-
      github.event.pull_request.head.ref == 'agent/owner-alpha-universal-practice-loop-v0' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: owner-alpha-practice-runtime-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      CI: "true"
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      OWNER_ALPHA_RUNTIME_EVIDENCE_PATH: ${{ github.workspace }}/.agent-factory/owner-alpha-runtime-evidence.json

    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${PR_HEAD_SHA}"
          [[ "${PR_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run generic and hostile owner-alpha tests
        run: npm run test -- tests/owner-alpha-universal-practice-loop-v0.test.mjs --workers=1

      - name: Verify exact-head learner RLS in isolated Postgres
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: node scripts/automation/verify-owner-alpha-practice-runtime.mjs

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mobile-first exact-head browser and accessibility acceptance
        env:
          OWNER_ALPHA_RUNTIME_E2E: "1"
          DEV_SMOKE_AUTH: "true"
          OWNER_ALPHA_UNIVERSAL_PRACTICE_ENABLED: "true"
          ALPHA_ADMIN_EMAILS: codex-smoke@localhost.test
          VERCEL_ENV: preview
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          npx playwright test
          tests/e2e/owner-alpha-universal-practice-runtime.spec.ts
          --config=playwright.owner-alpha.config.ts
          --project=owner-alpha-chromium
          --workers=1

      - name: Recheck exact head
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${PR_HEAD_SHA}"

      - name: Upload metadata-only runtime evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: owner-alpha-practice-runtime-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.OWNER_ALPHA_RUNTIME_EVIDENCE_PATH }}
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
