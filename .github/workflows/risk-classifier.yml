name: Risk Gate

on:
  pull_request:

jobs:
  risk-classifier:
    runs-on: ubuntu-latest
    concurrency:
      group: risk-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Classify risk
        run: node scripts/automation/classify-risk.mjs
