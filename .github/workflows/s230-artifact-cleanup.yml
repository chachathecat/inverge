name: S230 one-time artifact cleanup

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  actions: write

jobs:
  delete-exact-artifact:
    if: >-
      github.event.pull_request.number == 566 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.body, '<!-- run-s230-artifact-cleanup-8309208159 -->')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete exact artifact and verify absence
        uses: actions/github-script@v7
        with:
          script: |
            const artifactId = 8309208159;
            const { owner, repo } = context.repo;

            try {
              await github.request(
                'DELETE /repos/{owner}/{repo}/actions/artifacts/{artifact_id}',
                { owner, repo, artifact_id: artifactId }
              );
              core.info(`Deleted exact artifact ID ${artifactId}.`);
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info(`Exact artifact ID ${artifactId} was already absent.`);
            }

            try {
              await github.request(
                'GET /repos/{owner}/{repo}/actions/artifacts/{artifact_id}',
                { owner, repo, artifact_id: artifactId }
              );
              core.setFailed(`Exact artifact ID ${artifactId} still exists.`);
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info(`Verified exact artifact ID ${artifactId} returns 404.`);
            }
