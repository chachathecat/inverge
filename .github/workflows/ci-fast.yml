name: Fast CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fast-ci:
    runs-on: ubuntu-latest
    concurrency:
      group: fast-${{ github.event_name }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Focused tests
        run: npm run test -- --maxWorkers=1 --passWithNoTests
      - name: Verify learner loop
        run: npm run verify:learner-loop:ci
      - name: Run PR contract
        run: node scripts/automation/validate-pr-contract.mjs
      - name: Run risk classification
        run: node scripts/automation/classify-risk.mjs
