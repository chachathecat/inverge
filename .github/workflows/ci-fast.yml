name: Fast CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: fast-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-ci:
    name: fast-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Focused tests
        run: npm run test -- --workers=1
      - name: Verify learner loop
        run: npm run verify:learner-loop:ci
      - name: Run PR contract
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/automation/validate-pr-contract.mjs
      - name: Run risk classification
        if: github.event_name == 'pull_request'
        run: node scripts/automation/classify-risk.mjs
