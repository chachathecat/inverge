name: S232H.1 Shared V3 Shell Runtime Acceptance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  deployments: read

jobs:
  s232h1-shared-v3-shell:
    name: S232H.1 Exact-Head Shared V3 Shell
    if: >-
      github.event.pull_request.head.ref == 'agent/figma-v3-adoption-shell' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: s232h1-shared-v3-shell-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      CI: "true"
      E2E_RUNNER_SHA: ${{ github.event.pull_request.head.sha }}
      E2E_TARGET_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Require explicit authenticated acceptance marker
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: >-
          node --input-type=module -e
          'if (!(process.env.PR_BODY ?? "").includes("<!-- run-s232h1-auth-e2e -->")) {
          throw new Error("Missing S232H.1 authenticated acceptance marker"); }'

      - name: Check out exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Discover and verify exact-head Preview
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          test -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          [[ "${E2E_RUNNER_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]
          test "${E2E_TARGET_SHA}" = "${E2E_RUNNER_SHA}"

          exact_head_ready=0
          deadline=$((SECONDS + 900))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            deployments="$(gh api -X GET "/repos/${GITHUB_REPOSITORY}/deployments?sha=${E2E_RUNNER_SHA}&environment=Preview&per_page=20")" || deployments="[]"
            mapfile -t deployment_ids < <(
              DEPLOYMENTS="${deployments}" node --input-type=module -e '
                const values = JSON.parse(process.env.DEPLOYMENTS ?? "[]");
                for (const value of values) if (value?.id) process.stdout.write(String(value.id) + "\n");
              '
            )

            for deployment_id in "${deployment_ids[@]}"; do
              statuses="$(gh api -X GET "/repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses?per_page=20")" || statuses="[]"
              preview_url="$(
                STATUSES="${statuses}" node --input-type=module -e '
                  const values = JSON.parse(process.env.STATUSES ?? "[]");
                  const latest = values[0];
                  if (latest?.state !== "success") process.exit(0);
                  const raw = latest.environment_url ?? latest.target_url ?? "";
                  if (!raw) process.exit(0);
                  const url = new URL(raw);
                  if (url.protocol !== "https:" || url.username || url.password || url.search || url.hash ||
                    !/^inverge-[a-z0-9-]+-chachathecats-projects\.vercel\.app$/i.test(url.hostname)) process.exit(1);
                  process.stdout.write(url.origin);
                '
              )"

              if [ -n "${preview_url}" ]; then
                body_path="$(mktemp)"
                status="$(curl --silent --show-error --output "${body_path}" --write-out '%{http_code}' --connect-timeout 5 --max-time 15 --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" "${preview_url}/api/runtime/version")" || status="000"
                if [ "${status}" = "200" ] && BODY_PATH="${body_path}" EXPECTED_SHA="${E2E_RUNNER_SHA}" node --input-type=module -e '
                    import { readFileSync } from "node:fs";
                    const payload = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
                    if (payload.ready !== true || payload.deploymentSha !== process.env.EXPECTED_SHA) process.exit(1);
                  '; then
                  echo "E2E_BASE_URL=${preview_url}" >> "${GITHUB_ENV}"
                  echo "E2E_EXPECTED_HOST=${preview_url#https://}" >> "${GITHUB_ENV}"
                  exact_head_ready=1
                  rm -f "${body_path}"
                  break
                fi
                rm -f "${body_path}"
              fi
            done
            if [ "${exact_head_ready}" = "1" ]; then break; fi
            sleep 10
          done
          test "${exact_head_ready}" = "1"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run exact-head shared V3 shell acceptance
        env:
          S232H1_AUTH_RUNTIME: "1"
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL || secrets.TEST_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD || secrets.TEST_USER_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test tests/e2e/s232h1-shared-v3-shell.spec.ts --project=chromium --workers=1 --reporter=line

      - name: Recheck exact deployment SHA
        shell: bash
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          body_path="$(mktemp)"
          status="$(curl --silent --show-error --output "${body_path}" --write-out '%{http_code}' --connect-timeout 5 --max-time 20 --header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" "${E2E_BASE_URL}/api/runtime/version")"
          test "${status}" = "200"
          BODY_PATH="${body_path}" EXPECTED_SHA="${E2E_RUNNER_SHA}" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const payload = JSON.parse(readFileSync(process.env.BODY_PATH, "utf8"));
            if (payload.ready !== true || payload.deploymentSha !== process.env.EXPECTED_SHA) process.exit(1);
          '
          rm -f "${body_path}"

      - name: Validate metadata and screenshot evidence
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find test-results -type f -name s232h1-runtime.json -print)
          test "${#manifests[@]}" -eq 1
          MANIFEST_PATH="${manifests[0]}" EXPECTED_SHA="${E2E_RUNNER_SHA}" node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const value = JSON.parse(readFileSync(process.env.MANIFEST_PATH, "utf8"));
            if (value.result !== "pass" || value.runnerSha !== process.env.EXPECTED_SHA || value.targetDeploymentSha !== process.env.EXPECTED_SHA) process.exit(1);
            if (value.screenshotCount !== 3 || value.viewportEvidence?.length !== 3) process.exit(1);
            if (value.syntheticAccountOnly !== true || value.credentialsRedacted !== true || value.rawLearnerContentCaptured !== false) process.exit(1);
            for (const row of value.viewportEvidence) {
              if (row.horizontalOverflow !== 0 || row.undersizedHeaderTargetCount !== 0 || row.axeSeriousOrCritical !== 0 || row.keyboardFocusVisible !== true) process.exit(1);
              if (row.publicHorizontalOverflow !== 0 || row.publicUndersizedHeaderTargetCount !== 0 || row.publicAxeSeriousOrCritical !== 0) process.exit(1);
            }
            if (value.consoleErrorCount !== 0 || value.pageErrorCount !== 0 || value.sameOriginRequestFailureCount !== 0) process.exit(1);
          '
          mapfile -t screenshots < <(find test-results -type f -name 's232h1-shell-*.png' -print)
          test "${#screenshots[@]}" -eq 3

      - name: Upload synthetic visual evidence
        uses: actions/upload-artifact@v4
        with:
          name: s232h1-shared-v3-shell-${{ github.event.pull_request.head.sha }}
          path: |
            test-results/**/s232h1-runtime.json
            test-results/**/s232h1-shell-*.png
          if-no-files-found: error
          retention-days: 14
