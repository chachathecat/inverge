name: Runtime Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  runtime-gate:
    runs-on: ubuntu-latest
    concurrency:
      group: runtime-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Classify risk
        run: node scripts/automation/classify-risk.mjs > .agent-factory/risk.json
      - name: Runtime gate
        run: node scripts/automation/runtime-gate.mjs --risk-file .agent-factory/risk.json
