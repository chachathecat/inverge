name: Human Decision
description: Use this form when an agent needs a policy or scope decision.
title: "[Human Decision] "
labels: ["human-decision"]
body:
  - type: input
    id: summary
    attributes:
      label: Decision summary
      description: Summarize the required decision.
      placeholder: e.g. Approve database migration X
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Explain why this decision is needed and what options exist.
      placeholder: Provide context and options
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options
      description: Enumerate the potential options and their consequences.
      placeholder: Option A: ..., Option B: ...
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation
      description: Agent's recommended option and rationale.
      placeholder: I recommend Option A because ...
    validations:
      required: false
